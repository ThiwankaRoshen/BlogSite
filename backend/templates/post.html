{% extends "layout.html" %}
{% block content %}
    <article id="post-page" data-post-id="{{ post.id }}" data-owner-id="{{ post.author.id }}" class="mx-auto max-w-2xl">
        <div class="mb-8 flex items-center justify-between rounded-2xl border border-white/10 bg-slate-900/70 p-6">
            <div>
                <div class="mb-2 flex items-center gap-2">
                    <span class="rounded-full border border-cyan-400/20 bg-cyan-500/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.3em] text-cyan-200">Article</span>
                    <span class="text-sm text-slate-400">{{ post.date_posted }}</span>
                </div>
                <h1 id="post-title" class="text-4xl font-bold text-white sm:text-5xl">{{ post.title }}</h1>
            </div>
        </div>

        <div id="post-management" class="mb-4 hidden flex flex-wrap gap-3">
            <button id="edit-post-button" type="button" class="rounded-full border border-cyan-400/30 bg-cyan-500/10 px-4 py-2 text-sm font-medium text-cyan-200 transition hover:bg-cyan-500/20">Edit post</button>
            <button id="delete-post-button" type="button" class="rounded-full border border-rose-400/30 bg-rose-500/10 px-4 py-2 text-sm font-medium text-rose-200 transition hover:bg-rose-500/20">Delete post</button>
            <span id="post-action-status" class="text-sm text-slate-400"></span>
        </div>

        <form id="edit-post-form" class="mb-6 hidden rounded-2xl border border-white/10 bg-slate-900/70 p-6 shadow-lg">
            <div class="space-y-4">
                <div>
                    <label class="mb-2 block text-sm text-slate-300" for="edit-post-title">Title</label>
                    <input id="edit-post-title" name="title" type="text" class="w-full rounded-2xl border border-white/10 bg-slate-950/60 px-4 py-3 text-slate-100 outline-none ring-0" required>
                </div>
                <div>
                    <label class="mb-2 block text-sm text-slate-300" for="edit-post-content">Content</label>
                    <textarea id="edit-post-content" name="content" rows="6" class="w-full rounded-2xl border border-white/10 bg-slate-950/60 px-4 py-3 text-slate-100 outline-none ring-0" required></textarea>
                </div>
                <div class="flex flex-wrap gap-3">
                    <button type="submit" class="rounded-full border border-cyan-400/30 bg-cyan-500/10 px-4 py-2 text-sm font-medium text-cyan-200 transition hover:bg-cyan-500/20">Save changes</button>
                    <button id="cancel-edit-post" type="button" class="rounded-full border border-white/10 px-4 py-2 text-sm font-medium text-slate-300 transition hover:bg-white/10">Cancel</button>
                </div>
            </div>
        </form>

        <div class="rounded-2xl border border-white/10 bg-slate-900/70 p-8 shadow-lg">
            <div class="prose prose-invert max-w-none">
                <p id="post-content" class="text-lg leading-relaxed text-slate-200">{{ post.content }}</p>
            </div>

            <div class="mt-8 border-t border-white/10 pt-6">
                <p class="text-sm text-slate-400">
                    Written by 
                    <a href="{{ url_for('author_posts_page', user_id=post.author.id) }}" class="font-semibold text-white transition hover:text-cyan-300">{{ post.author.username }}</a>
                </p>
            </div>
        </div>

        <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-between">
            <a href="{{ url_for('home') }}" class="inline-flex items-center gap-2 rounded-full border border-cyan-400/30 bg-cyan-500/10 px-4 py-2 text-sm font-medium text-cyan-200 transition hover:bg-cyan-500/20">
                ← Back to posts
            </a>
            <div class="flex flex-wrap gap-2 text-sm text-slate-400">
                <span>Author: <span class="font-semibold text-white">{{ post.author.username }}</span></span>
                <span>Published: {{ post.date_posted }}</span>
            </div>
        </div>
    </article>
{% endblock content %}
