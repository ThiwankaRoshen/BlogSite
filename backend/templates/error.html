{% extends "layout.html" %}
{% block content %}
    <div class="mx-auto flex min-h-screen max-w-2xl flex-col items-center justify-center px-4">
        <div class="rounded-3xl border border-red-400/20 bg-slate-900/70 p-8 text-center shadow-2xl sm:p-12">
            <div class="mb-6 inline-block rounded-full border border-red-400/30 bg-red-500/10 p-4">
                <svg class="h-12 w-12 text-red-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4v2m0 0v2m0-6v-2m0 0V7a2 2 0 012-2h2.586a1 1 0 00.707-.293l1.414-1.414A2 2 0 0121 7v10a2 2 0 01-2 2h-2.586a1 1 0 00-.707.293l-1.414 1.414A2 2 0 0113 21H3a2 2 0 01-2-2V5a2 2 0 012-2h10a2 2 0 012 2z" />
                </svg>
            </div>

            <h1 class="text-6xl font-bold text-red-400 sm:text-7xl">{{ status_code }}</h1>
            <h2 class="mt-4 text-2xl font-semibold text-white sm:text-3xl">Something went wrong</h2>
            <p class="mt-3 text-lg text-slate-300">{{ message }}</p>

            <div class="mt-8 space-y-3">
                <a href="/" class="inline-flex items-center justify-center gap-2 rounded-full border border-cyan-400/30 bg-cyan-500/10 px-6 py-3 font-medium text-cyan-200 transition hover:bg-cyan-500/20">
                    ← Return to home
                </a>
                <div class="text-sm text-slate-400">
                    If the problem persists, please contact support.
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
